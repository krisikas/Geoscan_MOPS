services:
  db:
    image: postgres:15
    container_name: mops_postgres
    environment:
      POSTGRES_USER: mops_user
      POSTGRES_PASSWORD: mops_password
      POSTGRES_DB: mops_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: mops_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    restart: unless-stopped

volumes:
  postgres_data:
